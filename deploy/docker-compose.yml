services:
  cwv2:
    build: { context: .., dockerfile: deploy/Dockerfile }
    image: example/cwv2:latest
    restart: unless-stopped
    ports: ["8080:8080"]
    volumes: ["cwv2-data:/data"]        # engine home (durable state)
    healthcheck:
      test: ["CMD", "/usr/local/bin/cwv2", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 30s              # graceful shutdown (SIGTERM)
volumes:
  cwv2-data: {}
